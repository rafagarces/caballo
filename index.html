<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>El año del caballo y otras sustancias</title>
    <link rel="preload" href="./fonts/Neue Pixel Grotesk.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="./fonts/HelveticaNeue.ttc" as="font" type="font/collection" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #cc1c1c;
        height: 100dvh;
        overflow: hidden;
      }

      #texture-overlay {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: 0.06;
        mix-blend-mode: overlay;
        background-size: cover;
        background-position: center;
        transition: background-image 0.3s ease;
      }

      .poster {
        width: 100%;
        height: 100dvh;
        max-width: 1024px;
        margin: 0 auto;
        position: relative;
      }

      .horse-wrap {
        position: absolute;
        inset: 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        mix-blend-mode: multiply;
      }

      .horse-wrap svg {
        width: 100%;
        height: 100%;
        display: block;
        transform-origin: 50% 52%;
      }

      @keyframes neigh {
        0%   { transform: rotate(0deg)    translateY(0);     }
        10%  { transform: rotate(-3deg)   translateY(-6px);  }
        28%  { transform: rotate(4deg)    translateY(-18px); }
        44%  { transform: rotate(-2.5deg) translateY(-10px); }
        60%  { transform: rotate(2.5deg)  translateY(-5px);  }
        75%  { transform: rotate(-1deg)   translateY(-2px);  }
        88%  { transform: rotate(0.5deg)  translateY(-1px);  }
        100% { transform: rotate(0deg)    translateY(0);     }
      }

      .horse-wrap.neigh svg { animation: neigh 0.9s ease-in-out; }

      @media (max-width: 700px) {
        .horse-wrap { transform: scale(1.2); }
      }

      .text-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 2;
        pointer-events: none;
        padding: 0 5% 5%;
      }

      .event-info {
        font-family: "HelveticaNeue", sans-serif;
        font-weight: 400;
        font-size: clamp(0.7rem, 3.5vw, 1.2rem);
        color: #0d0808;
        line-height: 1.25;
        margin-bottom: 1em;
        padding-bottom: 2em;
        text-transform: uppercase;
      }

      @font-face {
        font-family: "Neue Pixel Grotesk";
        src: url("./fonts/Neue Pixel Grotesk.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        ascent-override: 85%;
        descent-override: 20%;
        line-gap-override: 0%;
      }

      @font-face {
        font-family: "HelveticaNeue";
        src: url("./fonts/HelveticaNeue.ttc") format("collection");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        ascent-override: 85%;
        descent-override: 20%;
        line-gap-override: 0%;
      }

      .main-title {
        font-size: 14vw; /* overridden by fitTitle() JS */
        color: #0d0808;
        line-height: 0.92;
        letter-spacing: -0.02em;
        margin-left: -0.05em;
        text-transform: uppercase;
      }

      .main-title span {
        display: inline;
        line-height: 0.92;
      }

      /* ── Recording UI ── */
      #rec-ui {
        position: fixed;
        top: 1.4rem;
        right: 1.4rem;
        z-index: 10;
        font-family: "HelveticaNeue", sans-serif;
        font-size: clamp(0.7rem, 3.5vw, 1.2rem);
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.5rem;
      }

      .rec-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        background: transparent;
        border: 2px solid #0d0808;
        border-radius: 9999px;
        padding: 0.4rem 1rem;
        color: #0d0808;
        white-space: nowrap;
      }

      .rec-btn {
        border: none;
        background: none;
        color: #0d0808;
        cursor: pointer;
        font-family: "HelveticaNeue", sans-serif;
        font-size: inherit;
        font-weight: 400;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        text-transform: uppercase;
      }
      .rec-btn:hover { opacity: 0.6; }
      #rec-ui[data-state="idle"] .rec-btn:hover { opacity: 1; }

      /* separador entre botones del estado preview */
      .rec-sep {
        width: 1px;
        height: 0.85em;
        background: #0d0808;
        opacity: 0.35;
        flex-shrink: 0;
      }

      /* countdown number */
      .rec-countdown-num {
        font-size: 1em;
        font-weight: 700;
        color: #0d0808;
      }

      @keyframes rec-pulse {
        from { box-shadow: 0 0 0   0 rgba(13,8,8,0.4); }
        to   { box-shadow: 0 0 0 8px rgba(13,8,8,0);   }
      }
      #rec-ui[data-state="recording"] .rec-row {
        animation: rec-pulse 0.8s ease-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="texture-overlay"></div>
    <div id="rec-ui" data-state="idle"></div>
    <main class="poster">
      <div class="horse-wrap" id="horse" role="button" tabindex="0" aria-label="Toca el caballo para hacerlo relinchar"></div>
      <div class="text-overlay">
        <p class="event-info">
          Sábado, 18 de abril.<br />
          A partir de las 13 h.<br />
          En el Monterrey grande.
        </p>
        <h1 class="main-title">El año del caballo y otras sustancias</h1>
      </div>
    </main>

    <script>
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");

      const horseWrap = document.getElementById("horse");

      // Mixed-font h1: each letter randomly Neue Pixel Grotesk or Helvetica Neue Medium
      const TITLE_FONTS = [
        { family: "Neue Pixel Grotesk", weight: "400" },
        { family: "HelveticaNeue",      weight: "400" },
      ];
      const h1 = document.querySelector(".main-title");
      const titleText = h1.textContent.trim();

      const NO_PIXEL = new Set(["ñ", "Ñ"]);

      // Build spans once, then only update fontFamily on each click
      let titleSpans = [];
      function buildTitle() {
        h1.innerHTML = "";
        titleSpans = [];
        [...titleText].forEach(ch => {
          if (ch === " ") { h1.appendChild(document.createTextNode(" ")); return; }
          const span = document.createElement("span");
          span.textContent = ch;
          h1.appendChild(span);
          titleSpans.push({ span, locked: NO_PIXEL.has(ch) });
        });
      }
      function scrambleFonts() {
        titleSpans.forEach(({ span, locked }) => {
          const f = locked ? TITLE_FONTS[1] : TITLE_FONTS[Math.floor(Math.random() * 2)];
          span.style.fontFamily = f.family;
          span.style.fontWeight = f.weight;
        });
      }

      // Fit H1 font-size so the widest word fills the container width exactly
      const probe = document.createElement("span");
      probe.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;pointer-events:none;font-weight:400;letter-spacing:-0.02em;text-transform:uppercase;";
      document.body.appendChild(probe);

      async function fitTitle() {
        await document.fonts.ready;
        const words  = titleText.toUpperCase().split(" ");
        const containerW = h1.offsetWidth;
        let lo = 8, hi = 600;
        for (let i = 0; i < 20; i++) {
          const mid = (lo + hi) / 2;
          probe.style.fontSize = mid + "px";
          const maxW = Math.max(...words.flatMap(w =>
            TITLE_FONTS.map(f => {
              probe.style.fontFamily = f.family;
              probe.textContent = w;
              return probe.offsetWidth;
            })
          ));
          if (maxW <= containerW) lo = mid; else hi = mid;
        }
        h1.style.fontSize = lo + "px";
      }

      // Debounce resize — evita spam de fitTitle y resizeConfetti
      let resizeTimer;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { resizeConfetti(); fitTitle(); }, 150);
      });

      // Color triples: [illustration fg, gradient start, gradient end]
      const COLORS = [
        ["#E8307A", "#CC1C1C", "#FF6B9D"],
        ["#F57C00", "#E64A19", "#FFB74D"],
        ["#FBC02D", "#F9A825", "#FFF176"],
        ["#43A047", "#2E7D32", "#80CBC4"],
        ["#1E88E5", "#1565C0", "#B3E5FC"],
        ["#8E24AA", "#6A1B9A", "#F8BBD0"],
      ];

      const textureEl = document.getElementById("texture-overlay");
      textureEl.style.backgroundImage = `url("./texture/Grain.png")`;

      function applyTheme(ci) {
        const [, c1, c2] = COLORS[ci];
        const angle = [135, 160, 45, 200, 315, 70][Math.floor(Math.random() * 6)];
        document.body.style.background = `linear-gradient(${angle}deg, ${c1} 0%, ${c2} 100%)`;
      }
      let colorIdx = 0;

      // SVG illustrations
      const SVGS = ["00","01","02","03","04","05"].map(n => `./svg/Vector${n}.svg`);
      const svgCache      = {};   // raw SVG strings
      const svgColorCache = {};   // SVG Documents parseados con color, clave: url+colorIdx
      const svgParser     = new DOMParser();
      let svgIdx = -1;

      function pickOther(current, len) {
        let n;
        do { n = Math.floor(Math.random() * len); } while (n === current && len > 1);
        return n;
      }

      async function fetchSVG(url) {
        if (svgCache[url]) return svgCache[url];
        const res = await fetch(url);
        if (!res.ok) throw new Error(res.status);
        let t = await res.text();
        t = t.replace(/\bwidth="[^"]*"/, 'width="100%"');
        t = t.replace(/\bheight="[^"]*"/, 'height="100%"');
        if (!t.includes("preserveAspectRatio"))
          t = t.replace("<svg ", '<svg preserveAspectRatio="xMidYMid meet" ');
        return (svgCache[url] = t);
      }

      async function loadSVG(si, ci) {
        try {
          const key = si + "-" + ci;
          if (!svgColorCache[key]) {
            const raw = await fetchSVG(SVGS[si]);
            const doc   = svgParser.parseFromString(raw, "image/svg+xml");
            const svgEl = doc.documentElement;
            const color = COLORS[ci][0];
            // Aplicar color directamente en el DOM — sin regex
            svgEl.querySelectorAll('[fill]:not([fill="none"])').forEach(el => {
              el.setAttribute("fill", color);
            });
            svgColorCache[key] = svgEl;
          }
          horseWrap.replaceChildren(svgColorCache[key].cloneNode(true));
        } catch (e) { console.error("SVG error:", e); }
      }

      // Audio — OGG para Chrome/Firefox, MP3 para Safari/iOS
      const _a = new Audio();
      const _ext = _a.canPlayType("audio/ogg; codecs=vorbis") ? "ogg" : "mp3";
      const AUDIO = ["01","02","05"].map(n => `./audio/${n}.${_ext}`);
      const audioCache = {};
      let ctx = null;

      function purgeBadUrl(url) {
        const idx = AUDIO.indexOf(url);
        if (idx !== -1) AUDIO.splice(idx, 1);
      }

      async function playNeigh(retries = 3) {
        if (AUDIO.length === 0) return;
        try {
          if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
          if (ctx.state === "suspended") await ctx.resume();
          const url = AUDIO[Math.floor(Math.random() * AUDIO.length)];
          if (!audioCache[url]) {
            const res = await fetch(url, { mode: "cors" });
            if (!res.ok) {
              purgeBadUrl(url);
              if (retries > 0) playNeigh(retries - 1);
              return;
            }
            try {
              audioCache[url] = await ctx.decodeAudioData(await res.arrayBuffer());
            } catch {
              // Grabación de usuario: formato no decodificable por AudioContext → reproducir directo
              const el = new Audio(url);
              el.crossOrigin = "anonymous";
              el.play().catch(() => { purgeBadUrl(url); if (retries > 0) playNeigh(retries - 1); });
              return;
            }
          }
          const src = ctx.createBufferSource();
          src.buffer = audioCache[url];
          // Pitch suave, sin rampa
          src.playbackRate.value = 0.9 + Math.random() * 0.3;

          // Ring mod único (350–650 Hz) — efecto robótico sutil
          const ringOsc = ctx.createOscillator();
          ringOsc.frequency.value = 350 + Math.floor(Math.random() * 300);
          const ringG = ctx.createGain(); ringG.gain.value = 0;
          ringOsc.connect(ringG.gain);

          // 25% dry (voz original) + 75% wet (ring mod)
          const dry    = ctx.createGain(); dry.gain.value = 0.65;
          const wet    = ctx.createGain(); wet.gain.value = 0.35;
          const master = ctx.createGain(); master.gain.value = 0.92;
          src.connect(dry);   dry.connect(master);
          src.connect(ringG); ringG.connect(wet); wet.connect(master);
          master.connect(ctx.destination);

          ringOsc.start(); src.start();
          src.onended = () => {
            try { ringOsc.stop(); } catch {}
            [src, ringG, dry, wet, master, ringOsc]
              .forEach(n => { try { n.disconnect(); } catch {} });
          };
        } catch (e) { console.error("Audio error:", e); }
      }

      // ── CONFETTI ────────────────────────────────────────────────────────────
      const confettiCanvas = document.createElement("canvas");
      confettiCanvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:100;";
      document.body.appendChild(confettiCanvas);
      const cc = confettiCanvas.getContext("2d");
      cc.textAlign = "center";
      cc.textBaseline = "middle";

      // Redimensionar solo en resize, no en cada spawn
      function resizeConfetti() {
        confettiCanvas.width  = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
      resizeConfetti();
      // resize gestionado por el debounce central (ver arriba)

      const EMOJIS   = ["🐴","✨","🍄","💊","🔥"];
      const MAX_PARTICLES = 2000;

      let particles    = [];
      let confettiRaf  = null;

      function spawnConfetti(x, y) {
        const slots = MAX_PARTICLES - particles.length;
        const count = Math.min(30, slots);          // max 30 por spawn, cap total 80
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 4 + Math.random() * 14;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 6,
            size: Math.round(18 + Math.random() * 24),
            emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
            alpha: 1,
            decay: 0.012 + Math.random() * 0.01,
          });
        }
        if (!confettiRaf) animateConfetti();
      }

      function animateConfetti() {
        cc.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        // Actualizar y dibujar sin save/restore ni rotación
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.vy += 0.45; p.vx *= 0.98;
          p.x += p.vx;  p.y += p.vy;
          p.alpha -= p.decay;
          if (p.alpha <= 0) { particles.splice(i, 1); continue; }
          cc.globalAlpha = p.alpha;
          cc.font = `${p.size}px serif`;
          cc.fillText(p.emoji, p.x, p.y);
        }
        confettiRaf = particles.length ? requestAnimationFrame(animateConfetti) : null;
      }
      // ────────────────────────────────────────────────────────────────────────

      function trigger() {
        horseWrap.classList.remove("neigh");
        void horseWrap.offsetWidth;
        horseWrap.classList.add("neigh");
        horseWrap.addEventListener("animationend", () => horseWrap.classList.remove("neigh"), { once: true });
        scrambleFonts();
        playNeigh();
        svgIdx = pickOther(svgIdx, SVGS.length);
        colorIdx = pickOther(colorIdx, COLORS.length);
        applyTheme(colorIdx);
        loadSVG(svgIdx, colorIdx);
      }

      horseWrap.addEventListener("click", e => {
        spawnConfetti(e.clientX, e.clientY);
        trigger();
      }, { passive: true });
      horseWrap.addEventListener("touchstart", e => {
        const t = e.touches[0];
        spawnConfetti(t.clientX, t.clientY);
        trigger();
      }, { passive: true });
      horseWrap.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          spawnConfetti(window.innerWidth / 2, window.innerHeight / 2);
          trigger();
        }
      });

      // ── SUPABASE ──────────────────────────────────────────────────────────
      const SB_URL    = "https://mdinlvlefvaqsnamdjmb.supabase.co";
      const SB_KEY    = "sb_publishable_MaLdXuLpnzgC1F2yODiXiQ_LAkKyrl5";
      const SB_BUCKET = "recordings";
      let sb = null;

      async function initSupabase() {
        try {
          sb = window.supabase.createClient(SB_URL, SB_KEY);
          const { data, error } = await sb.from("recordings").select("url");
          if (!error && data) data.forEach(r => AUDIO.push(r.url));
        } catch (e) { console.warn("Supabase init:", e); }
      }

      // ── GRABACIÓN ─────────────────────────────────────────────────────────
      const recUI = document.getElementById("rec-ui");

      // Estado: idle | recording | preview | uploading
      function setRecState(state, html = "") {
        recUI.dataset.state = state;
        recUI.innerHTML = html;
      }

      let mediaRec   = null;
      let recChunks  = [];
      let recTimer   = null;
      let previewBlob = null;
      let previewExt  = "";
      let previewAudio = null;

      function renderIdle() {
        setRecState("idle", `
          <div class="rec-row">
            <button class="rec-btn" id="rec-start">Relincha</button>
          </div>`);
        document.getElementById("rec-start").addEventListener("click", startRecording);
      }

      function renderRecording(seconds) {
        const pct = ((3 - seconds) / 3) * 100;
        setRecState("recording", `
          <div class="rec-row">
            <span>Grabando…</span>
            <span class="rec-sep"></span>
            <span class="rec-countdown-num">${seconds}</span>
          </div>`);
      }

      function renderPreview() {
        setRecState("preview", `
          <div class="rec-row">
            <button class="rec-btn" id="rec-play">Escuchar</button>
            <span class="rec-sep"></span>
            <button class="rec-btn" id="rec-save">Guardar</button>
            <span class="rec-sep"></span>
            <button class="rec-btn" id="rec-cancel">Cancelar</button>
          </div>`);
        document.getElementById("rec-play").addEventListener("click", playPreview);
        document.getElementById("rec-save").addEventListener("click", confirmRecording);
        document.getElementById("rec-cancel").addEventListener("click", () => {
          stopPreview();
          previewBlob = null;
          renderIdle();
        });
      }

      function renderUploading() {
        setRecState("uploading", `<div class="rec-row">⏳ Guardando…</div>`);
      }

      function playPreview() {
        if (!previewBlob) return;
        const btn = document.getElementById("rec-play");
        if (previewAudio) {
          stopPreview();
          if (btn) btn.textContent = "Escuchar";
          return;
        }
        previewAudio = new Audio(URL.createObjectURL(previewBlob));
        previewAudio.play();
        if (btn) btn.textContent = "Parar";
        previewAudio.onended = () => {
          previewAudio = null;
          if (btn) btn.textContent = "Escuchar";
        };
      }

      function stopPreview() {
        if (previewAudio) { previewAudio.pause(); previewAudio = null; }
      }

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          const mime = ["audio/webm;codecs=opus","audio/webm","audio/mp4"]
            .find(t => MediaRecorder.isTypeSupported(t)) || "";
          mediaRec  = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
          recChunks = [];
          mediaRec.ondataavailable = e => e.data.size && recChunks.push(e.data);
          mediaRec.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            previewExt  = (mediaRec.mimeType || "").includes("mp4") ? "mp4" : "webm";
            previewBlob = new Blob(recChunks, { type: mediaRec.mimeType });
            renderPreview();
          };
          mediaRec.start(100);

          let t = 3;
          renderRecording(t);
          recTimer = setInterval(() => {
            t--;
            if (t <= 0) { clearInterval(recTimer); stopRecording(); }
            else renderRecording(t);
          }, 1000);
        } catch (e) {
          console.error("Mic:", e);
          renderIdle(); // permiso denegado → volver a idle
        }
      }

      function stopRecording() {
        clearInterval(recTimer);
        if (mediaRec && mediaRec.state !== "inactive") mediaRec.stop();
      }

      async function confirmRecording() {
        stopPreview();
        if (!previewBlob || !sb) { renderIdle(); return; }
        renderUploading();
        try {
          const name = `rec_${Date.now()}_${Math.random().toString(36).slice(2)}.${previewExt}`;
          const { error: upErr } = await sb.storage.from(SB_BUCKET)
            .upload(name, previewBlob, { contentType: previewBlob.type });
          if (upErr) throw upErr;

          const { data: { publicUrl } } = sb.storage.from(SB_BUCKET).getPublicUrl(name);
          await sb.from("recordings").insert({ url: publicUrl });
          AUDIO.push(publicUrl);

          setRecState("success", `<div class="rec-row">✅ ¡Guardado!</div>`);
          setTimeout(renderIdle, 2000);
        } catch (e) {
          console.error("Upload:", e);
          setRecState("error", `<div class="rec-row">❌ Error al guardar</div>`);
          setTimeout(renderIdle, 2500);
        }
      }
      // ────────────────────────────────────────────────────────────────────────

      // Initial load + preload rest
      (async () => {
        svgIdx = pickOther(-1, SVGS.length);
        applyTheme(colorIdx);
        await Promise.all([
          loadSVG(svgIdx, colorIdx),
          initSupabase(),
        ]);
        renderIdle();
        buildTitle();
        scrambleFonts();
        fitTitle();
        SVGS.forEach((url, i) => { if (i !== svgIdx) fetchSVG(url); });
        AUDIO.forEach(url => {
          if (audioCache[url]) return;
          fetch(url).then(r => r.arrayBuffer()).then(buf => {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            ctx.decodeAudioData(buf, decoded => { audioCache[url] = decoded; });
          }).catch(() => {});
        });
      })();
    </script>
  </body>
</html>
